# Application settings for Spring Boot
# This file is read automatically when the app starts

# Server port (default is 8080)
server.port=8080

# Application name
spring.application.name=Medical Appointment System

# Thymeleaf settings (for HTML template rendering)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Show detailed errors in the browser during development
server.error.include-message=always
