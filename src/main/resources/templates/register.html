<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediSync — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0d1117; --paper: #f5f2ec;
    --accent: #2a5c45; --accent-light: #3d8c69;
    --warm: #c9613a; --muted: #8a8278;
    --line: rgba(13,17,23,0.10); --card: #ffffff;
    --serif: 'DM Serif Display', serif;
    --sans: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .form-card { width: 100%; max-width: 560px; background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.06); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .logo { font-family: var(--serif); font-size: 1.3rem; text-decoration: none; color: var(--ink); }
  .logo span { color: var(--accent); }
  .login-link { font-size: 0.8rem; color: var(--muted); }
  .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .form-tag { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; font-weight: 600; color: var(--warm); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem; }
  .form-tag::before { content: ''; width: 18px; height: 1.5px; background: var(--warm); }
  .form-title { font-family: var(--serif); font-size: 1.9rem; margin-bottom: 0.35rem; }
  .form-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.75rem; }
  .alert { padding: 0.85rem 1rem; border-radius: 12px; font-size: 0.82rem; margin-bottom: 1.25rem; }
  .alert-error { background: #fde8df; color: var(--warm); border: 1px solid rgba(201,97,58,0.2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { margin-bottom: 1rem; }
  .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.45rem; }
  .form-input, .form-select { width: 100%; padding: 0.85rem 1rem; border: 1.5px solid var(--line); border-radius: 12px; font-family: var(--sans); font-size: 0.875rem; background: var(--card); color: var(--ink); transition: border-color 0.2s; outline: none; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .terms { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.8rem; color: var(--muted); margin: 1.25rem 0; line-height: 1.5; }
  .terms input { accent-color: var(--accent); margin-top: 2px; }
  .btn-submit { width: 100%; padding: 0.95rem; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-family: var(--sans); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-submit:hover { background: var(--accent-light); }
  .form-bottom { text-align: center; margin-top: 1.25rem; font-size: 0.78rem; color: var(--muted); }
  .form-bottom a { color: var(--accent); text-decoration: none; }
  @media (max-width: 560px) { .form-card { padding: 1.5rem; } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="form-card">

  <div class="card-top">
    <a href="/" class="logo">Medi<span>Sync</span></a>
    <span class="login-link">Already have an account? <a href="/login">Sign in</a></span>
  </div>

  <div class="form-tag">New Patient</div>
  <h2 class="form-title">Create your account</h2>
  <p class="form-sub">Join MediSync to book and manage your appointments.</p>

  <!-- ERROR MESSAGE -->
  <div th:if="${error}" class="alert alert-error">
    ⚠️ <span th:text="${error}">Error message</span>
  </div>

  <!-- REGISTER FORM -->
  <form action="/register" method="post">
    <input type="hidden" name="action" value="register"/>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" name="name" class="form-input"
             placeholder="Kasun Wickramasinghe" required/>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-input"
             placeholder="kasun@email.com" required/>
    </div>

    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input type="tel" name="phone" class="form-input"
             placeholder="+94 77 000 0000"/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date of Birth</label>
        <input type="date" name="dateOfBirth" class="form-input"/>
      </div>
      <div class="form-group">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
          <option value="">Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Prefer not to say</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Patient Type</label>
      <select name="patientType" class="form-select" required>
        <option value="Regular">Regular</option>
        <option value="Premium">Premium</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input"
             placeholder="Create a strong password" required/>
    </div>

    <label class="terms">
      <input type="checkbox" required/>
      I agree to the Terms of Service and Privacy Policy
    </label>

    <button type="submit" class="btn-submit">Create Account →</button>
  </form>

  <div class="form-bottom">
    <a href="/">← Back to Homepage</a>
  </div>

</div>
</body>
</html>
